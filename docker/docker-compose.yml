version: '3.8'
services:
  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ./api:/app #Desde los dos puntos se guarda hacia la < Host, hacia la > Contenedor
    environment:
      PORT: 4000 
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: database
    ports:
      - "4000:4000"
    command: sh -c "npm install && npm run start:dev"
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: database
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  adminer:
    image: adminer:latest
    ports:
      - "8090:8080"
    depends_on:
      - db

volumes:
  mysql_data: 